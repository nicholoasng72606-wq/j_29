<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JUPAS Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<h2>🎓 JUPAS Calculator</h2>

<div class="input-panel">
    <div class="subjects">
        <div class="subject">Chinese <select id="chi">
            <option value="0">U</option><option value="1">1</option><option value="2">2</option>
            <option value="3">3</option><option value="4" selected>4</option><option value="5">5</option>
            <option value="6">5*</option><option value="7" >5**</option>
        </select></div>
        <div class="subject">English <select id="eng">
            <option value="0">U</option><option value="1">1</option><option value="2">2</option>
            <option value="3">3</option><option value="4" selected>4</option><option value="5">5</option>
            <option value="6">5*</option><option value="7" >5**</option>
        </select></div>
        <div class="subject">Math <select id="math">
            <option value="0">U</option><option value="1">1</option><option value="2">2</option>
            <option value="3">3</option><option value="4" selected>4</option><option value="5">5</option>
            <option value="6">5*</option><option value="7" >5**</option>
        </select></div>
        <div class="subject">M2 <select id="m2">
            <option value="0">U</option><option value="1">1</option><option value="2">2</option>
            <option value="3">3</option><option value="4" selected>4</option><option value="5">5</option>
            <option value="6">5*</option><option value="7" >5**</option>
        </select></div>
        <div class="subject">Physics <select id="phy">
            <option value="0">U</option><option value="1">1</option><option value="2">2</option>
            <option value="3">3</option><option value="4" selected>4</option><option value="5">5</option>
            <option value="6">5*</option><option value="7" >5**</option>
        </select></div>
        <div class="subject">Chemistry <select id="chem">
            <option value="0">U</option><option value="1">1</option><option value="2">2</option>
            <option value="3">3</option><option value="4" selected>4</option><option value="5">5</option>
            <option value="6">5*</option><option value="7" >5**</option>
        </select></div>
        <div class="subject">Biology <select id="bio">
            <option value="0">U</option><option value="1">1</option><option value="2">2</option>
            <option value="3">3</option><option value="4" selected>4</option><option value="5">5</option>
            <option value="6">5*</option><option value="7">5**</option>
        </select></div>
    </div>
</div>
<div><a class="backpage" href="https://github.com/nicholoasng72606-wq/j_29" target="_blank">Back to GitHub</a></div>
<br>
<p id="ads">Admission score:</p>
<a href="https://admissions.hku.hk/sites/default/files/2025-10/HKU-JUPAS-Admissions-Information-2026.pdf" target="_blank">HKU</a>
<a href="https://admission.cuhk.edu.hk/wp-content/uploads/2025/05/Admission-Grades-2025.pdf"target="_blank">CUHK</a>
<a href="https://publication.join.ust.hk/view/13965330/"target="_blank">HKUST</a>
<a href="https://www.polyu.edu.hk/aradm/jupas/admission_figures.pdf"target="_blank">PolyU</a>
<div class="filter-bar">
  <label for="categoryFilter"><strong>📂 Category:</strong></label>
  <select id="categoryFilter">
    <option value="ALL">-- All --</option>
    <option value="ARCHITECTURE">Architecture</option>
    <option value="BUSINESS">Business</option>
    <option value="COMPUTING AND DATA SCIENCE">Computing And Data Science</option>
    <option value="DENTISTRY">Dentistry</option>
    <option value="ENGINEERING">Engineering</option>
    <option value="HEALTH SCIENCES">Health Science</option>
    <option value="MEDICINE">Medicine</option>
    <option value="SCIENCE">Science</option>
  </select>
  <input type="text" id="searchInput" placeholder="Search code or name..." style="padding:8px; font-size:16px; border-radius:6px; border:1px solid #aaa; min-width:200px;">
  <button id="printBtn" class="printBtn" >📥 Save as PDF</button>
  <label style="margin-left:10px;"><input type="checkbox" id="favOnly"> ⭐ Show only favorites</label>
</div>
<table id="resultTable">
    <thead>
        <tr>
            <th>⭐</th>
            <th>JUPAS Code</th>
            <th>Programme Name</th>
            <th>Your Score</th>
            <th>UQ</th>
            <th>Median</th>
            <th>LQ</th>
            <th>Chance</th>
            <th>Your position</th>
        </tr>
    </thead>
    <tbody id="resultBody">
        <tr><td colspan="9" class="loading">Loading programme data...</td></tr>
    </tbody>
</table>
<div class="info-note"></div>

<script type="module" src="main.js"></script>
</body>
</html>
