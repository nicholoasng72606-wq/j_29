<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JUPAS Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<h2>🎓 JUPAS Calculator</h2>

<div class="input-panel">
    <div class="subjects">
        <div class="subject">Chinese <select id="chi">
            <option value="0">U</option><option value="1">1</option><option value="2">2</option>
            <option value="3">3</option><option value="4">4</option><option value="5">5</option>
            <option value="6">5*</option><option value="7" selected>5**</option>
        </select></div>
        <div class="subject">English <select id="eng">
            <option value="0">U</option><option value="1">1</option><option value="2">2</option>
            <option value="3">3</option><option value="4">4</option><option value="5">5</option>
            <option value="6">5*</option><option value="7" selected>5**</option>
        </select></div>
        <div class="subject">Math <select id="math">
            <option value="0">U</option><option value="1">1</option><option value="2">2</option>
            <option value="3">3</option><option value="4">4</option><option value="5">5</option>
            <option value="6">5*</option><option value="7" selected>5**</option>
        </select></div>
        <div class="subject">M2 <select id="m2">
            <option value="0">U</option><option value="1">1</option><option value="2">2</option>
            <option value="3">3</option><option value="4">4</option><option value="5">5</option>
            <option value="6">5*</option><option value="7" selected>5**</option>
        </select></div>
        <div class="subject">Physics <select id="phy">
            <option value="0">U</option><option value="1">1</option><option value="2">2</option>
            <option value="3">3</option><option value="4">4</option><option value="5">5</option>
            <option value="6">5*</option><option value="7" selected>5**</option>
        </select></div>
        <div class="subject">Chemistry <select id="chem">
            <option value="0">U</option><option value="1">1</option><option value="2">2</option>
            <option value="3">3</option><option value="4">4</option><option value="5">5</option>
            <option value="6">5*</option><option value="7" selected>5**</option>
        </select></div>
        <div class="subject">Biology <select id="bio">
            <option value="0">U</option><option value="1">1</option><option value="2">2</option>
            <option value="3">3</option><option value="4">4</option><option value="5">5</option>
            <option value="6">5*</option><option value="7" selected>5**</option>
        </select></div>
    </div>
</div>

<table id="resultTable">
    <thead>
        <tr>
            <th>JUPAS Code</th>
            <th>Programme Name</th>
            <th>Your Score</th>
            <th>UQ</th>
            <th>Median</th>
            <th>LQ</th>
            <th>Chance</th>
        </tr>
    </thead>
    <tbody id="resultBody">
        <tr><td colspan="7" class="loading">Loading programme data...</td></tr>
    </tbody>
</table>
<div class="info-note"></div>

<script type="module" src="main.js"></script>
</body>
</html>
